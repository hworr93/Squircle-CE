name: Compilar Squircle-CE Release

on:
  workflow_dispatch: # Esto te permite iniciar la compilación con un botón manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          submodules: recursive # Descarga los submódulos automáticamente

      - name: Configurar Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Crear directorio app si no existe
        run: mkdir -p app

      - name: Decodificar el Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Crear local.properties
        run: |
          # Ponemos las propiedades tanto en la raíz como en /app para asegurar
          echo "KEYSTORE_PATH=keystore.jks" > local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

          # Copiamos el mismo archivo a la carpeta app para variante Foss
          cp local.properties app/local.properties

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Detener Gradle Daemon
        run: ./gradlew --stop

      - name: Limpiar caché de Gradle
        run: ./gradlew clean

      - name: Compilar APK (Release)
        run: ./gradlew assembleRelease --no-daemon

      - name: Subir el APK final
        uses: actions/upload-artifact@v4
        with:
          name: Squircle-CE-APK
          path: app/build/outputs/apk/release/*.apk